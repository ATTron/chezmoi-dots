blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

# Match niri's geometry-corner-radius 12
border_radius=12
no_radius_when_single=1
focused_opacity=1.0
unfocused_opacity=1.0

animations=1
layer_animations=0
animation_type_open=slide
animation_type_close=slide
animation_fade_in=0
animation_fade_out=0
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=1
animation_duration_open=1
animation_duration_tag=350
animation_duration_close=1
animation_duration_focus=1
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

scroller_structs=20
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
# Match niri's preset-column-widths: 33%, 50%, 67%
scroller_proportion_preset=0.33,0.5,0.67

# Master-Stack Layout Setting
# Match niri's default-column-width 50%
new_is_master=1
default_mfact=0.50
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
hotarea_corner=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0

# Match niri's focus-follows-mouse
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
cursor_theme=Simp1e-Gruvbox-Dark
drag_tile_to_tile=1

# Monitor — match niri output eDP-1 settings
monitorrule=name:^eDP-1$,width:2880,height:1920,refresh:120,scale:1.5,x:1280,y:0,rr:0

# Keyboard — match niri input settings
repeat_rate=35
repeat_delay=200
numlockon=1
xkb_rules_layout=us
xkb_rules_options=caps:ctrl_modifier

# Trackpad — match niri touchpad settings
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=0
trackpad_natural_scrolling=1
axis_scroll_factor=0.6
click_method=2
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# Mouse
mouse_natural_scrolling=0

# Appearance — match niri's gaps 5 (uniform)
gappih=5
gappiv=5
gappoh=5
gappov=5
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
# Match niri's focus-ring width ~2
borderpx=2
rootcolor=0x00000000
bordercolor=0x505050ff
# Match niri's active-color #7fc8ff
focuscolor=0x7fc8ffff
maximizescreencolor=0x89aa61ff
# Match niri's urgent-color #9b0000
urgentcolor=0x9b0000ff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# Layouts per tag — all tile (closest to niri's scrolling column layout)
# 1: browser (monocle — fullscreen single app)
tagrule=id:1,layout_name:monocle
# 2: terminal (monocle — tmux handles splits)
tagrule=id:2,layout_name:monocle
# 3+: scroller for flexible workflow
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller

# ============================================================
# Key Bindings — mapped from niri (niri Mod = Super)
# ============================================================

# Autostart (exec-once runs only on initial launch, not on reload)
exec-once=qs -c noctalia-shell
exec-once=swaybg -i /home/korra/.walls/bebop_wall2_cropped.png
exec-once=swayidle -w timeout 900 'qs -c noctalia-shell ipc call lockScreen lock' timeout 1600 "wlopm --off '*'" resume "wlopm --on '*'" before-sleep 'qs -c noctalia-shell ipc call lockScreen lock'

# Reload config
bind=SUPER,r,reload_config

# Terminal and launchers (matching niri binds)
bind=SUPER,Return,spawn,ghostty
bind=SUPER,d,spawn,fuzzel
bind=SUPER,space,spawn,fuzzel
bind=SUPER+SHIFT,space,spawn,qs -c noctalia-shell ipc call launcher toggle
bind=SUPER,b,spawn,/home/korra/.local/bin/wp-selector
bind=SUPER,o,spawn,helium-browser

# Lock screen
bind=SUPER+ALT,l,spawn,qs -c noctalia-shell ipc call lockScreen lock

# Media keys
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.05+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.05-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl --class=backlight set +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl --class=backlight set 5%-
bind=NONE,XF86AudioPlay,spawn,playerctl -p tidal-hifi play-pause
bind=NONE,XF86AudioNext,spawn,playerctl -p tidal-hifi next
bind=NONE,XF86AudioPrev,spawn,playerctl -p tidal-hifi previous

# Close window / quit
bind=SUPER,q,killclient,
bind=SUPER+SHIFT,e,quit

# Overview
bind=SUPER,Tab,toggleoverview,

# Window focus — arrow keys and vim keys (Mod+H/J/K/L)
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right

# Move/swap windows (Mod+Ctrl)
bind=SUPER+CTRL,Left,exchange_client,left
bind=SUPER+CTRL,Right,exchange_client,right
bind=SUPER+CTRL,Up,exchange_client,up
bind=SUPER+CTRL,Down,exchange_client,down
bind=SUPER+CTRL,h,exchange_client,left
bind=SUPER+CTRL,j,exchange_client,down
bind=SUPER+CTRL,k,exchange_client,up
bind=SUPER+CTRL,l,exchange_client,right

# Monitor focus (Mod+Shift)
bind=SUPER+SHIFT,Left,focusmon,left
bind=SUPER+SHIFT,Right,focusmon,right
bind=SUPER+SHIFT,Up,focusmon,up
bind=SUPER+SHIFT,Down,focusmon,down
bind=SUPER+SHIFT,h,focusmon,left
bind=SUPER+SHIFT,j,focusmon,down
bind=SUPER+SHIFT,k,focusmon,up
bind=SUPER+SHIFT,l,focusmon,right

# Move window to monitor (Mod+Shift+Ctrl)
bind=SUPER+SHIFT+CTRL,Left,tagmon,left
bind=SUPER+SHIFT+CTRL,Right,tagmon,right
bind=SUPER+SHIFT+CTRL,h,tagmon,left
bind=SUPER+SHIFT+CTRL,l,tagmon,right

# Window states
bind=SUPER,f,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,v,togglefloating,

# Workspace focus (Mod+1-9)
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Move window to workspace (Mod+Shift+1-9)
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# Adjacent workspace navigation
bind=SUPER,Page_Down,viewtoright,0
bind=SUPER,Page_Up,viewtoleft,0
bind=SUPER,u,viewtoright,0
bind=SUPER,i,viewtoleft,0
bind=SUPER+CTRL,Page_Down,tagtoright,0
bind=SUPER+CTRL,Page_Up,tagtoleft,0
bind=SUPER+CTRL,u,tagtoright,0
bind=SUPER+CTRL,i,tagtoleft,0

# Resize (Mod+Minus/Equal → ±10%)
bind=SUPER,minus,resizewin,-50,+0
bind=SUPER,equal,resizewin,+50,+0
bind=SUPER+SHIFT,minus,resizewin,+0,-50
bind=SUPER+SHIFT,equal,resizewin,+0,+50

# Scroller proportion preset (closest to niri's switch-preset-column-width)
bind=SUPER,x,switch_proportion_preset,

# Switch layout
bind=SUPER,n,switch_layout

# Scratchpad
bind=SUPER,z,toggle_scratchpad

# Screenshots
bind=NONE,Print,spawn,grim
bind=CTRL,Print,spawn,grim -o $(wlr-randr --json | jq -r '.[0].name')
bind=ALT,Print,spawn,grim -g "$(slurp)"

# Gaps
bind=SUPER+SHIFT,x,incgaps,1
bind=SUPER+SHIFT,z,incgaps,-1
bind=SUPER+SHIFT,r,togglegaps

# Mouse Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings — scroll to switch workspaces
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
